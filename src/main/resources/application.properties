
# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${PORT:80}

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics

# ===============================
# APPLICATION CONFIGURATION
# ===============================
spring.application.name=poc-column-ordering

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===============================
# JPA / HIBERNATE
# ===============================
# spring.jpa.show-sql=true
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

spring.jpa.properties.hibernate.hbm2ddl.auto=validate
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.default_schema=${MARIADB_DATABASE:mariadb}

spring.datasource.url=jdbc:mysql://mariadb:3306/${MARIADB_DATABASE:mariadb}?useSSL=false&serverTimezone=Asia/Bangkok
spring.datasource.username=${MARIADB_USER:mariadb}
spring.datasource.password=${MARIADB_PASSWORD:mariadb}